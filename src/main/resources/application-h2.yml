# H2 Database Profile - Zero Config Demo
# Usage: mvn spring-boot:run -Dspring.profiles.active=h2

spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  datasource:
    url: jdbc:h2:mem:credit_approval_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE,KEY
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    locations: classpath:db/migration-h2

camunda:
  bpm:
    database:
      type: h2
      schema-update: true
