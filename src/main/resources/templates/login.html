<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Güvenli Giriş - Kredi Onay Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body class="bank-login-page">
    <div class="bank-login-card">
        <div class="bank-login-logo">
            <i class="bi bi-shield-lock-fill"></i>
            <h2>Kredi Onay Sistemi</h2>
            <p>Güvenli Giriş</p>
        </div>

        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" class="bank-alert bank-alert-danger">
                Geçersiz kullanıcı adı veya şifre.
            </div>
            <div th:if="${param.logout}" class="bank-alert bank-alert-success">
                Başarıyla çıkış yapıldı.
            </div>

            <div class="bank-form-group">
                <label for="username">Kullanıcı Adı</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Kullanıcı adınızı girin">
                </div>
            </div>

            <div class="bank-form-group">
                <label for="password">Şifre</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Şifrenizi girin">
                </div>
            </div>

            <button type="submit" class="bank-login-btn">Giriş Yap</button>

            <div class="mt-4 text-center">
                <small class="text-muted">Test: admin, manager, analyst, risk (şifre: aynı)</small>
            </div>
        </form>
    </div>
</body>
</html>
