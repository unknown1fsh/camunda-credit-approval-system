<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Kredi Onay Sistemi' : 'Kredi Onay Sistemi'}">Kredi Onay Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>
    <header class="bank-header" th:fragment="header">
        <div class="bank-header-inner">
            <a th:href="@{/dashboard}" class="bank-logo">
                <i class="bi bi-bank2"></i>
                <span class="bank-title">Kredi Onay Sistemi</span>
            </a>
            <nav class="bank-nav">
                <a th:href="@{/dashboard}" class="bank-nav-link">Dashboard</a>
                <a th:href="@{/applications}" class="bank-nav-link">Başvurular</a>
                <a th:href="@{/tasks}" class="bank-nav-link">Görevler</a>
            </nav>
            <div class="bank-user" th:if="${username}">
                <i class="bi bi-person-circle"></i>
                <span th:text="${username}">Kullanıcı</span>
                <a th:href="@{/logout}" class="bank-logout"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
            </div>
        </div>
    </header>

    <footer class="bank-footer" th:fragment="footer">
        <div class="bank-footer-inner">
            <span>Kredi Onay Sistemi &copy; 2026</span>
            <span class="bank-footer-divider">|</span>
            <span>Güvenli Bankacılık</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
