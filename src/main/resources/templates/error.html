<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Hata')}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>

    <main class="bank-main">
        <div class="bank-container">
            <div class="card bank-dashboard-card border-danger">
                <div class="card-body text-center py-5">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
                    <h2 class="mt-3">Bir Hata Oluştu</h2>
                    <p class="text-muted mt-2" th:text="${error} ?: 'Beklenmeyen bir hata meydana geldi.'">Hata mesajı</p>
                    <a th:href="@{/dashboard}" class="bank-btn bank-btn-primary mt-4">
                        <i class="bi bi-house me-2"></i>Ana Sayfaya Dön
                    </a>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
