<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Görev Detayı')}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>

    <main class="bank-main">
        <div class="bank-container">
            <h1 class="bank-page-title"><i class="bi bi-clipboard-check me-2"></i><span th:text="${task.name}">Görev</span></h1>

            <div class="bank-alert bank-alert-warning mb-4">
                <strong>Not:</strong> Bu görev tipi için özel form tanımlanmamıştır.
                Görevi tamamlamak için <a href="/camunda/app/tasklist" target="_blank" class="bank-link">Camunda Tasklist</a> kullanabilirsiniz.
            </div>

            <div class="bank-card mb-4">
                <h3 class="bank-section-title">Görev Bilgileri</h3>
                <div class="bank-detail-row">
                    <div class="bank-detail-label">Görev ID</div>
                    <div class="bank-detail-value"><code th:text="${task.id}">task-id</code></div>
                </div>
                <div class="bank-detail-row">
                    <div class="bank-detail-label">Tanım Anahtarı</div>
                    <div class="bank-detail-value"><code th:text="${task.taskDefinitionKey}">Activity_XXX</code></div>
                </div>
                <div class="bank-detail-row">
                    <div class="bank-detail-label">Oluşturulma</div>
                    <div class="bank-detail-value" th:text="${task.createTime != null ? #dates.format(task.createTime, 'dd/MM/yyyy HH:mm') : '-'}">-</div>
                </div>
            </div>

            <div class="bank-card" th:if="${variables != null and !variables.isEmpty()}">
                <h3 class="bank-section-title">Süreç Değişkenleri</h3>
                <table class="bank-table">
                    <thead>
                        <tr>
                            <th>Değişken</th>
                            <th>Değer</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry : ${variables.entrySet()}">
                            <td th:text="${entry.key}">key</td>
                            <td th:text="${entry.value}">value</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4">
                <a href="/tasks" class="bank-btn bank-btn-outline me-2">Görevlere Dön</a>
                <a href="/camunda/app/tasklist" class="bank-btn bank-btn-primary" target="_blank">Camunda Tasklist</a>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
